name: PR Discord Notifications

on:
  pull_request:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          MERGE_WEBHOOK: ${{ secrets.DISCORD_PR_MERGE_WEBHOOK }}
          CLOSE_WEBHOOK: ${{ secrets.DISCORD_PR_CLOSE_WEBHOOK }}
          OWNER_ID: ${{ secrets.DISCORD_OWNER_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$PR_MERGED" = "true" ]; then
            WEBHOOK_URL="$MERGE_WEBHOOK"
            COLOR=3066993
            ACTION="merged"
            EMOJI="✅"
          else
            WEBHOOK_URL="$CLOSE_WEBHOOK"
            COLOR=15158332
            ACTION="closed"
            EMOJI="❌"
          fi

          [ -z "$WEBHOOK_URL" ] && echo "No webhook configured" && exit 0

          MENTION=""
          if [ "$ACTION" = "closed" ] && [ -n "$OWNER_ID" ]; then
            MENTION="<@${OWNER_ID}>"
          fi

          PAYLOAD=$(jq -n \
            --arg title "$EMOJI PR #$PR_NUMBER $ACTION: $PR_TITLE" \
            --arg url "$PR_URL" \
            --argjson color "$COLOR" \
            --arg repo "$REPO" \
            --arg author "$PR_AUTHOR" \
            --arg mention "$MENTION" \
            '{
              username: "GitHub",
              content: $mention,
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                fields: [
                  {name: "Repository", value: ("`" + $repo + "`"), inline: true},
                  {name: "Author", value: $author, inline: true}
                ],
                footer: {text: "GitHub Actions"}
              }]
            }')

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
